<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./index.js" defer></script>
</head>
<body id="body">
    <div id="div_login">
        <h2>Login</h2>
        <form id="login_form">
            <label for="input_nome">nome:</label><br>
            <input type="text" id="input_nome" name="username"><br><br>

            <label for="input_password">senha:</label><br>
            <input type="password" id="input_password" name="password"><br><br>

            <label for="input_email">Email:</label><br>
            <input type="email" id="input_email" name="email"><br><br>

            <input type="button" id="button_login" value="Login">
        </form>
    </div>
</body>
</html>
