<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema</title>
    <link rel="stylesheet" href="./login_page/view/styles/index.css">
    <script type="module" src="./login_page/controller/index.js" defer></script>
</head>
<body>
    <div class="container">
        <div id="login-container" class="form-container animar-entrada">
            <h2>Entrar no Sistema</h2>
            <p class="subtitle">Insira seus dados de acesso</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="exemplo@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Sua senha" required>
                </div>
                
                <button type="submit" class="btn-submit">Acessar</button>
            </form>
            
            <p class="switch-form">Novo por aqui? <a href="#" id="link-to-register">Crie uma conta</a></p>
        </div>

        <div id="register-container" class="form-container hidden">
            <h2>Criar Conta</h2>
            <p class="subtitle">Preencha os campos para se registrar</p>
            
            <form id="register-form">
                <div class="input-group">
                    <label for="register-name">Nome Completo</label>
                    <input type="text" id="register-name" placeholder="Seu nome" required>
                </div>

                <div class="input-group">
                    <label for="register-email">E-mail</label>
                    <input type="email" id="register-email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="register-password">Senha</label>
                    <input type="password" id="register-password" placeholder="Mínimo 6 dígitos" minlength="6" required>
                </div>
                
                <button type="submit" class="btn-submit">Cadastrar</button>
            </form>
            
            <p class="switch-form">Já tem registro? <a href="#" id="link-to-login">Faça Login</a></p>
        </div>
    </div>

    <script type="module" src="./controller/index.js"></script>
</body>
</html>
