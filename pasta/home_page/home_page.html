                            y="14"
                            width="18"
                            height="2"
                            rx="1"

                </div>

                    <span class="logo-brand">VRDX</span>
                    <span class="logo-tagline">Urban Wear</span>

                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>

                            x1="3"
                            y1="6"
                            x2="21"
                            y2="6"
                        />
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                    Ver carrinho
                    <span class="cart-badge">3</span>
                </a>
                <div class="divider"></div>
                <a class="user-pill" href="#">
                    <div class="user-avatar">JD</div>
                    <span class="user-name">Samuel</span>
                </a>
            </div>
        </header>

            </div>

                <div id="banner-track">

                        <div class="amar"></div>
                        <div class="azul"></div>
                        <div class="verd"></div>
                        <div class="slide-content">
                            <img src="https://imgnike-a.akamaihd.net/360x360/097113NX.jpg" alt="Descrição da imagem" class="slide-image">
                            <div class="slide-caption">

                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="btn-banner-direito" onclick="moverBanner('D')">
                <i class="fa-solid fa-angle-right"></i>
            </div>
        </nav>
