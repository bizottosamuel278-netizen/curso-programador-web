<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Bandeiras</title>
</head>
<body>
<div id="Bandeiras1">
         <div id="Bandeira-russia" class="band-horizontal">
             <div class="cor-branca"></div>
             <div class="cor-azul"></div>
             <div class="cor-vermelha"></div>
         </div>
       
         <div id="Bandeira-franca" class="band-vertical">
             <div class="cor-azul"></div>
             <div class="cor-branca"></div>
             <div class="cor-vermelha"></div>
         </div>
   
        <div id="Bandeira-belgica" class="band-vertical">
            <div class="cor-preta"></div>
            <div class="cor-amarela"></div>
            <div class="cor-vermelha"></div>
        </div>
</div>
   <div id="Bandeiras2">
     <div id="Bandeira-alemanha" class="band-horizontal">
         <div class="cor-preta"></div>
         <div class="cor-vermelha"></div>
         <div class="cor-amarela"></div>
    </div>

     <div id="Bandeira-italia" class="band-vertical">
         <div class="cor-verde"></div>
         <div class="cor-branca"></div>
         <div class="cor-vermelha"></div>
     </div>

   <div id="Bandeira-japao">
     <div class="cor-vermelha"></div>
     <div class="cor-branca"></div>
     <div class="circulo"></div>
   </div>
</div>
<div id="Bandeiras3">
        <div class="Bandeira-brasil">
            <div class="losangulo">
                <div class="circulo-brasil">
                    <div class="linha-atravessada"></div>
                </div>
            </div>
        </div>
        <div class="cor-verde"></div>
        <div class="cor-amarela"></div>

<div id="Bandeira-Ucrania" class="band-h2l">
    <div class="cor-azul"></div>
     <div class="cor-amarela"></div>
   </div>
</div>

</div>

</body>
</html>
