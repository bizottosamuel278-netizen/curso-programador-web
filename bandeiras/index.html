<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>bandeiras</title>
        <link rel="stylesheet" href="bandeiras.css">
    </head>
    <body>
        <div>
            <div id="bandeira-russia" class="bandeira-horizontal">
                <div class="cor_branca"></div>
                <div class="cor_azul"></div>
                <div class="cor_vermelha"></div>
            </div>
            &emsp;
            <div id="bandeira-franca" class="bandeira-vertical">
                <div class="cor_vermelha"></div>
                <div class="cor_branca"></div>
                <div class="cor_azul"></div>
            </div>
        </div>
        <div>
            &emsp;
            <div id="bandeira-belgica" class="bandeira-vertical">
                <div class="cor_preta"></div>
                <div class="cor_amarela"></div>
                <div class="cor_vermelha"></div>
            </div>
            &emsp;
            <div id="bandeira-alemanha" class="bandeira-horizontal">
                <div class="cor_preta"></div>
                <div class="cor_vermelha"></div>
                <div class="cor_amarela"></div>
            </div>
            &emsp;
            <div id="bandeira-italia" class="bandeira-vertical">
                <div class="cor_verde"></div>
                <div class="cor_branca"></div>
                <div class="cor_vermelha"></div>
            </div>
        </div>

    </body>
</html>
